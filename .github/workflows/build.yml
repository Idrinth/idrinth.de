name: Build Site

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install brotli
        run: sudo apt-get install -y brotli

      - name: Run cron.php
        run: php bin/cron.php

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git add public/
          git diff --cached --quiet || git commit -m "Regenerate site output"
          git push
